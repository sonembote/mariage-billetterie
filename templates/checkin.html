<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verification billet</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 760px; margin: 30px auto; padding: 0 16px; }
    button { padding: 10px 16px; font-size: 15px; }
  </style>
</head>
<body>
  <h1>Verification billet</h1>
  <p>Invite: <strong>{{ ticket.guest_name }}</strong></p>
  <p>Statut actuel: <strong>{{ ticket.status }}</strong></p>
  {% if ticket.used_at %}
  <p>Deja utilise a: {{ ticket.used_at }}</p>
  {% endif %}

  {% if ticket.status != 'used' %}
  <form method="post">
    <button type="submit">Valider l'entree</button>
  </form>
  {% else %}
  <p></p>
  {% endif %}
</body>
</html>
