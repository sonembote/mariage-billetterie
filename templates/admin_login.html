<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="page">
    <header class="site-header">
      <a href="/" class="brand" style="text-decoration:none;">Le Banquier de Dieu<span>Administration</span></a>
    </header>
    <div class="container container--narrow">
      <div class="card">
        <h1 class="panel__title">Connexion</h1>
        <p class="panel__lead">Accès réservé à l’organisation de l’événement.</p>
        {% if error %}<div class="alert alert--error" role="alert">{{ error }}</div>{% endif %}
        <form method="post" class="login-form">
          <div class="form-group">
            <label class="form-label" for="password">Mot de passe</label>
            <input class="form-control" type="password" id="password" name="password" required autocomplete="current-password">
          </div>
          <button type="submit" class="btn btn--primary btn--block" style="margin-top: var(--space-md);">Se connecter</button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
