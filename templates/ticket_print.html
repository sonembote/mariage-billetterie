<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Impression — {{ ticket.guest_name }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="ticket-print">
  <div class="page">
    <div class="container container--narrow">
      <div class="card">
        <p style="font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--color-text-muted); margin: 0 0 0.5rem;">Billet officiel</p>
        <h1>Billet de mariage</h1>
        <p><strong>Invité :</strong> {{ ticket.guest_name }}</p>
        <p><strong>Statut :</strong> {{ ticket.status }}</p>
        <p style="font-size: 0.85rem; color: var(--color-text-muted); word-break: break-all;"><strong>Référence :</strong> {{ ticket.token }}</p>
        {% if ticket.used_at %}
        <p><strong>Entrée validée le :</strong> {{ ticket.used_at }}</p>
        {% endif %}
        <div class="ticket-card__qr">
          <img src="/qr/{{ ticket.token }}" alt="QR Code" width="240" height="240">
          <p class="hint" style="text-align:center; margin-bottom:0;">À scanner à l’entrée</p>
        </div>
        <div class="print-actions no-print">
          <button type="button" class="btn btn--primary btn--block" onclick="window.print()">Imprimer ou enregistrer en PDF</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
